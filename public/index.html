<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurisxium</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; }
  header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 1rem 2rem; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  .badge { font-size: 12px; padding: 2px 8px; border-radius: 99px; }
  .badge-green { background: #d1fae5; color: #065f46; }
  .badge-red { background: #fee2e2; color: #991b1b; }
  main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
  input, textarea { padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; }
  input:focus, textarea:focus { border-color: #6366f1; }
  button.primary { padding: 10px 20px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  button.primary:hover { background: #4f46e5; }
  button.primary:disabled { opacity: 0.5; cursor: default; }
  .ask-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .ask-box textarea { width: 100%; height: 90px; resize: vertical; margin-bottom: 10px; }
  .hint { font-size: 12px; color: #aaa; margin-bottom: 10px; }
  .answer-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; font-size: 14px; line-height: 1.8; white-space: pre-wrap; }
  .keywords { font-size: 12px; color: #888; margin-bottom: 1rem; }
  .keywords span { background: #ede9fe; color: #4c1d95; padding: 2px 8px; border-radius: 99px; margin-right: 4px; font-size: 11px; }
  .sources-title { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 8px; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 10px; }
  .card:hover { border-color: #a5b4fc; }
  .card-title { font-size: 14px; font-weight: 600; color: #1a1a1a; text-decoration: none; display: block; margin-bottom: 8px; }
  .card-title:hover { color: #6366f1; }
  .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .b { font-size: 11px; padding: 2px 8px; border-radius: 99px; }
  .b-date { background: #f3f4f6; color: #374151; }
  .b-juris { background: #d1fae5; color: #065f46; }
  .b-chamber { background: #ede9fe; color: #4c1d95; }
  .b-solution { background: #dbeafe; color: #1e40af; }
  .excerpt { font-size: 13px; color: #555; line-height: 1.6; }
  .excerpt em { background: #fef9c3; color: #713f12; font-style: normal; padding: 0 2px; border-radius: 2px; }
  .loading { text-align: center; color: #888; padding: 2rem 0; font-size: 14px; }
  .error { background: #fee2e2; color: #991b1b; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 1rem; }
</style>
</head>
<body>

<header>
  <h1>⚖️ Jurisxium</h1>
  <span id="statusBadge" class="badge badge-green">connecté</span>
</header>

<main style="margin-top:2rem;">
  <div class="ask-box">
    <textarea id="question" placeholder="Ex : Quels sont les délais de prescription en matière commerciale ? Un employeur peut-il licencier pour faute grave sans mise en garde préalable ?"></textarea>
    <div class="hint">Ctrl+Entrée pour envoyer</div>
    <button class="primary" id="btnAsk" onclick="doAsk()">Analyser avec l'IA</button>
  </div>
  <div id="askResults"></div>
</main>

<script>
document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) doAsk();
});

async function checkStatus() {
  try {
    const r = await fetch('/api/healthcheck');
    const d = await r.json();
    const el = document.getElementById('statusBadge');
    el.textContent = d.ok ? 'connecté' : 'erreur';
    el.className = 'badge ' + (d.ok ? 'badge-green' : 'badge-red');
  } catch(e) {
    document.getElementById('statusBadge').textContent = 'hors ligne';
    document.getElementById('statusBadge').className = 'badge badge-red';
  }
}

function cardTitle(d) {
  const juris = d.jurisdiction ? d.jurisdiction.toUpperCase() : '';
  const chamber = d.chamber ? ', ' + d.chamber : '';
  const date = d.date ? ' — ' + new Date(d.date).toLocaleDateString('fr-FR') : '';
  const solution = d.solution ? ' (' + d.solution + ')' : '';
  return (juris + chamber + date + solution) || d.id;
}

function cardHTML(d) {
  const url = d.permalink || ('https://www.courdecassation.fr/decision/' + d.id);
  const date = d.date ? new Date(d.date).toLocaleDateString('fr-FR') : '';
  return `<div class="card">
    <a class="card-title" href="${url}" target="_blank">${cardTitle(d)} ↗</a>
    <div class="badges">
      ${date ? '<span class="b b-date">📅 ' + date + '</span>' : ''}
      ${d.jurisdiction ? '<span class="b b-juris">' + d.jurisdiction + '</span>' : ''}
      ${d.chamber ? '<span class="b b-chamber">' + d.chamber + '</span>' : ''}
      ${d.solution ? '<span class="b b-solution">' + d.solution + '</span>' : ''}
    </div>
    ${d.excerpt ? '<div class="excerpt">' + d.excerpt + '</div>' : ''}
  </div>`;
}

async function doAsk() {
  const question = document.getElementById('question').value.trim();
  if (!question) return;
  const btn = document.getElementById('btnAsk');
  btn.disabled = true;
  btn.textContent = 'Analyse en cours...';
  document.getElementById('askResults').innerHTML = '<div class="loading">L\'IA recherche et analyse les décisions...</div>';

  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ question })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const kw = data.keywords.split(' ').map(k => '<span>' + k + '</span>').join('');
    let html = '<div class="keywords">Mots-clés recherchés : ' + kw + '</div>';
    html += '<div class="answer-box">' + data.answer.replace(/</g, '&lt;') + '</div>';
    if (data.decisions.length) {
      html += '<div class="sources-title">Décisions sources (' + data.decisions.length + ')</div>';
      html += data.decisions.map(d => cardHTML(d)).join('');
    }
    document.getElementById('askResults').innerHTML = html;
  } catch(err) {
    document.getElementById('askResults').innerHTML = '<div class="error">Erreur : ' + err.message + '</div>';
  }

  btn.disabled = false;
  btn.textContent = 'Analyser avec l\'IA';
}

checkStatus();
</script>
</body>
</html>
