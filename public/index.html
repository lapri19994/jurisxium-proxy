<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurisxium</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; }
header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0.875rem 2rem; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 1rem; font-weight: 700; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
.dot.off { background: #ef4444; }

.page { max-width: 820px; margin: 0 auto; padding: 2rem 1rem 6rem; }

textarea { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; resize: vertical; line-height: 1.6; }
textarea:focus { border-color: #6366f1; }

button.btn { padding: 9px 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; cursor: pointer; background: #fff; font-family: inherit; }
button.btn:hover { background: #f5f5f5; }
button.btn.primary { background: #6366f1; color: #fff; border-color: #6366f1; }
button.btn.primary:hover { background: #4f46e5; }
button.btn.primary:disabled { opacity: 0.5; cursor: default; }
button.btn.green { background: #16a34a; color: #fff; border-color: #16a34a; }
button.btn.green:hover { background: #15803d; }

.section { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
.label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.75rem; }
.label-gray { color: #888; }
.label-purple { color: #6366f1; }
.label-blue { color: #2563eb; }
.label-green { color: #16a34a; }

.facts-text { font-size: 14px; line-height: 1.7; color: #333; }

.q-list { display: flex; flex-direction: column; gap: 8px; }
.q-card { border: 1px solid #e5e5e5; border-radius: 10px; padding: 1rem 1.25rem; background: #fafafa; }
.q-num { font-size: 11px; font-weight: 700; color: #6366f1; margin-bottom: 3px; }
.q-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.q-desc { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 8px; }
.q-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.q-tag { font-size: 11px; background: #ede9fe; color: #4c1d95; padding: 2px 8px; border-radius: 99px; }

.action-row { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; }

.progress-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
.progress-title { font-size: 13px; font-weight: 600; color: #2563eb; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px; }
.progress-rows { display: flex; flex-direction: column; gap: 5px; }
.progress-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.pq { font-family: monospace; font-size: 12px; background: #f3f4f6; padding: 2px 8px; border-radius: 4px; color: #374151; }
.pc { font-size: 12px; color: #6366f1; font-weight: 600; min-width: 50px; }
.progress-status { font-size: 12px; color: #888; margin-top: 8px; font-style: italic; }

.analysis-title { font-size: 15px; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #f0f0f0; }
.analysis-body { font-size: 14px; line-height: 1.9; }
.analysis-body h2 { font-size: 12px; font-weight: 700; color: #6366f1; margin: 1.25rem 0 0.5rem; text-transform: uppercase; letter-spacing: 0.3px; }
.analysis-body p { margin-bottom: 0.75rem; }
.analysis-body ul { padding-left: 1.25rem; margin-bottom: 0.75rem; }
.analysis-body li { margin-bottom: 0.3rem; }
.analysis-body strong { font-weight: 600; }
.analysis-body a { color: #6366f1; text-decoration: none; font-size: 12px; border: 1px solid #c7d2fe; border-radius: 3px; padding: 1px 5px; margin: 0 2px; vertical-align: middle; white-space: nowrap; }
.analysis-body a:hover { background: #ede9fe; }
.analysis-meta { font-size: 12px; color: #aaa; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #f0f0f0; }

.sep { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }

.chat-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e5e5e5; padding: 0.875rem 1.5rem; }
.chat-row { display: flex; gap: 8px; max-width: 820px; margin: 0 auto; }
.chat-row textarea { height: 40px; resize: none; overflow: hidden; padding: 9px 14px; border-radius: 8px; }
.chat-row button { padding: 0 18px; height: 40px; }

.spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid #ddd; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.initial h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
.initial p { color: #888; font-size: 14px; margin-bottom: 1.5rem; }
</style>
</head>
<body>

<header>
  <h1>⚖️ Jurisxium</h1>
  <span id="statusDot" class="dot"></span>
</header>

<div class="page" id="page">
  <div id="initialView">
    <div class="initial" style="margin-bottom:1.5rem;">
      <h2>Analyse juridique</h2>
      <p>Décrivez votre situation. Jurisxium identifie les questions de droit, recherche jusqu'à 150 décisions par question et rédige une analyse en syllogisme.</p>
    </div>
    <div class="section">
      <div class="label label-gray">Situation</div>
      <textarea id="factsInput" rows="6" placeholder="Décrivez les faits en détail..."></textarea>
      <div class="action-row">
        <button class="btn primary" id="btnQualify" onclick="qualify()">Identifier les questions de droit →</button>
      </div>
    </div>
  </div>
  <div id="resultsView" style="display:none;"></div>
</div>

<div class="chat-bar" id="chatBar" style="display:none;">
  <div class="chat-row">
    <textarea id="chatInput" placeholder="Posez une question sur l'analyse..." onkeydown="chatKey(event)"></textarea>
    <button class="btn primary" onclick="sendChat()">Envoyer</button>
  </div>
</div>

<script>
let state = { facts: '', questions: [], history: [], stopped: false };

async function api(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function el(id) { return document.getElementById(id); }

function append(html) {
  const v = el('resultsView');
  v.insertAdjacentHTML('beforeend', html);
  v.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderMd(text) {
  let h = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h2>$1</h2>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
    .replace(/\n\n/g,'</p><p>');
  h = '<p>'+h+'</p>';
  return h.replace(/<p><\/p>/g,'').replace(/<p>(<[hu])/g,'$1').replace(/<\/(h2|ul)><\/p>/g,'</$1>');
}

async function checkStatus() {
  try {
    const r = await fetch('/api/healthcheck');
    const d = await r.json();
    el('statusDot').className = 'dot'+(d.ok?'':' off');
  } catch(e) { el('statusDot').className = 'dot off'; }
}

async function qualify() {
  const facts = el('factsInput').value.trim();
  if (!facts) return;
  state.facts = facts;
  const btn = el('btnQualify');
  btn.disabled = true;
  btn.textContent = 'Analyse...';

  try {
    const data = await api('/api/qualify', { facts });
    state.questions = data.questions_droit || [];

    el('initialView').style.display = 'none';
    el('resultsView').style.display = 'block';
    el('chatBar').style.display = 'block';

    append(`<div class="section">
      <div class="label label-gray">Résumé des faits</div>
      <div class="facts-text">${data.resume_faits}</div>
    </div>`);

    let qHtml = `<div class="section" id="qualifySection">
      <div class="label label-purple">Questions de droit (${state.questions.length})</div>
      <div class="q-list">`;
    state.questions.forEach((q,i) => {
      qHtml += `<div class="q-card">
        <div class="q-num">Question ${i+1}</div>
        <div class="q-title">${q.titre}</div>
        <div class="q-desc">${q.description}</div>
        <div class="q-tags">${(q.branches||[]).map(b=>`<span class="q-tag">${b}</span>`).join('')}</div>
      </div>`;
    });
    qHtml += `</div><div class="action-row">
      <button class="btn green" onclick="startAnalysis()">Analyser ces questions →</button>
      <button class="btn" onclick="focusChat('Modifie les questions : ')">Modifier</button>
    </div></div>`;
    append(qHtml);

  } catch(e) {
    append(`<div class="section" style="color:#991b1b;">Erreur : ${e.message}</div>`);
    btn.disabled = false;
    btn.textContent = 'Identifier les questions →';
  }
}

function focusChat(prefix) {
  el('chatInput').value = prefix;
  el('chatInput').focus();
}

async function startAnalysis() {
  el('qualifySection')?.querySelector('.action-row')?.remove();
  state.stopped = false;
  append('<hr class="sep">');

  for (let i = 0; i < state.questions.length; i++) {
    if (state.stopped) break;
    await analyzeQuestion(i);
    append('<hr class="sep">');
  }

  if (!state.stopped) {
    append(`<div class="section" style="background:#f0fdf4;border-color:#bbf7d0;">
      <div class="label label-green">✓ Analyse complète</div>
      <div class="facts-text">Toutes les questions ont été analysées. Utilisez le chat pour approfondir.</div>
    </div>`);
  }
}

async function analyzeQuestion(idx) {
  const q = state.questions[idx];
  const boxId = 'progress-' + idx;

  append(`<div class="progress-box" id="${boxId}">
    <div class="progress-title"><span class="spinner"></span> Question ${idx+1}/${state.questions.length} — ${q.titre}</div>
    <div class="progress-rows" id="${boxId}-rows"></div>
    <div class="progress-status" id="${boxId}-status">Génération des requêtes...</div>
  </div>`);

  function setStatus(msg) {
    const s = el(boxId+'-status');
    if (s) s.textContent = msg;
  }

  function addRow(query, count) {
    const rows = el(boxId+'-rows');
    if (!rows) return;
    const existing = rows.querySelector(`[data-q="${query}"]`);
    if (existing) {
      existing.querySelector('.pc').textContent = count + ' JP';
    } else {
      rows.insertAdjacentHTML('beforeend',
        `<div class="progress-row" data-q="${query}">
          <span class="pq">${query}</span>
          <span class="pc">${count} JP</span>
        </div>`);
    }
  }

  try {
    // Génère requêtes initiales
    const { requetes } = await api('/api/get-queries', { question: q, facts: state.facts });
    let allQueries = requetes || [q.titre];
    let allDecisions = [];
    const seenIds = new Set();
    const queryCounts = {};
    let totalJP = 0;
    let sufficient = false;
    const MAX_JP = 150;

    allQueries.forEach(qr => { queryCounts[qr] = 0; addRow(qr, 0); });

    let queryIdx = 0;
    let page = 0;
    let newQueryRound = 0;

    while (totalJP < MAX_JP && !sufficient && queryIdx < allQueries.length) {
      if (state.stopped) return;

      const currentQuery = allQueries[queryIdx];
      setStatus(`Recherche "${currentQuery}" page ${page+1}... (${totalJP} JP analysées)`);

      const result = await api('/api/search-jp', { query: currentQuery, page });
      const newDecs = result.decisions.filter(d => !seenIds.has(d.id));
      newDecs.forEach(d => seenIds.add(d.id));
      allDecisions.push(...newDecs);
      totalJP += newDecs.length;
      queryCounts[currentQuery] = (queryCounts[currentQuery] || 0) + newDecs.length;
      addRow(currentQuery, queryCounts[currentQuery]);

      // Évalue tous les 20 JP
      if (totalJP >= 20 && totalJP % 20 < 10) {
        setStatus(`${totalJP} JP analysées — évaluation de la pertinence...`);
        const eval_ = await api('/api/evaluate-jp', { question: q, decisions: allDecisions });
        if (eval_.sufficient) {
          sufficient = true;
          setStatus(`✓ ${totalJP} JP analysées — jurisprudence suffisante`);
          break;
        }
      }

      // Page suivante ou requête suivante
      if (result.has_more && page < 4) {
        page++;
      } else {
        queryIdx++;
        page = 0;

        // Si on a épuisé toutes les requêtes sans résultat suffisant
        if (queryIdx >= allQueries.length && totalJP < MAX_JP && newQueryRound < 2) {
          newQueryRound++;
          setStatus(`Génération de nouvelles requêtes (tentative ${newQueryRound})...`);
          try {
            const { requetes: newReqs } = await api('/api/new-queries', {
              question: q,
              tried_queries: allQueries
            });
            if (newReqs?.length) {
              newReqs.forEach(qr => { queryCounts[qr] = 0; addRow(qr, 0); allQueries.push(qr); });
            } else break;
          } catch(e) { break; }
        }
      }
    }

    setStatus(`${totalJP} JP analysées — rédaction de l'analyse...`);

    // Recherche loi
    const lois = await legiSearch(q);

    // Rédaction
    const decisionsToSend = allDecisions.slice(0, 20).map(function(d) { return { id: d.id, date: d.date, jurisdiction: d.jurisdiction, chamber: d.chamber, solution: d.solution, permalink: d.permalink, excerpt: (d.excerpt || '').slice(0, 300), fullText: (d.fullText || '').slice(0, 500) }; });
    const { analysis } = await api('/api/write-analysis', {
      question: q,
      facts: state.facts,
      decisions: decisionsToSend,
      lois
    });

    // Remplace la progress box par l'analyse
    const box = el(boxId);
    if (box) {
      box.outerHTML = `<div class="section">
        <div class="analysis-title">Question ${idx+1} — ${q.titre}</div>
        <div class="analysis-body">${renderMd(analysis)}</div>
        <div class="analysis-meta">${totalJP} décisions analysées · ${(q.branches||[]).join(', ')}</div>
      </div>`;
    }

  } catch(e) {
    const box = el(boxId);
    if (box) box.outerHTML = `<div class="section" style="color:#991b1b;">Erreur question ${idx+1} : ${e.message}</div>`;
  }
}

async function legiSearch(q) {
  try {
    const res = await fetch('/api/write-analysis', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ question: q, facts: state.facts, decisions: [], lois: [], legiOnly: true })
    });
    return [];
  } catch(e) { return []; }
}

function chatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

async function sendChat() {
  const input = el('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const v = el('resultsView');
  v.insertAdjacentHTML('beforeend', `<div class="section" style="background:#ede9fe;border-color:#c4b5fd;">
    <div class="facts-text" style="color:#3730a3;">${msg.replace(/</g,'&lt;')}</div>
  </div>`);

  try {
    const context = `Faits : ${state.facts}\nQuestions : ${state.questions.map((q,i)=>(i+1)+'. '+q.titre).join(', ')}`;
    const data = await api('/api/chat', { message: msg, history: state.history, context });
    v.insertAdjacentHTML('beforeend', `<div class="section"><div class="analysis-body">${renderMd(data.reply)}</div></div>`);
    state.history.push({ role:'user', content:msg });
    state.history.push({ role:'assistant', content:data.reply });
  } catch(e) {
    v.insertAdjacentHTML('beforeend', `<div class="section" style="color:#991b1b;">Erreur : ${e.message}</div>`);
  }
}

checkStatus();
</script>
</body>
</html>
