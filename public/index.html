<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurisxium</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; }
header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0.875rem 2rem; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 1rem; font-weight: 700; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
.dot.off { background: #ef4444; }

.page { max-width: 820px; margin: 0 auto; padding: 2rem 1rem 6rem; }

/* Initial */
.initial h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
.initial p { color: #888; font-size: 14px; margin-bottom: 1.5rem; }
textarea { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; resize: vertical; line-height: 1.6; }
textarea:focus { border-color: #6366f1; }
button.btn { padding: 9px 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; cursor: pointer; background: #fff; font-family: inherit; }
button.btn:hover { background: #f5f5f5; }
button.btn.primary { background: #6366f1; color: #fff; border-color: #6366f1; }
button.btn.primary:hover { background: #4f46e5; }
button.btn.primary:disabled { opacity: 0.5; cursor: default; }
button.btn.green { background: #16a34a; color: #fff; border-color: #16a34a; }
button.btn.green:hover { background: #15803d; }

.section { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.75rem; }
.label-gray { color: #888; }
.label-purple { color: #6366f1; }
.label-blue { color: #2563eb; }
.label-green { color: #16a34a; }

.facts-text { font-size: 14px; line-height: 1.7; color: #333; }

.q-list { display: flex; flex-direction: column; gap: 8px; }
.q-card { border: 1px solid #e5e5e5; border-radius: 10px; padding: 1rem 1.25rem; background: #fafafa; }
.q-num { font-size: 11px; font-weight: 700; color: #6366f1; margin-bottom: 3px; }
.q-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.q-desc { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 8px; }
.q-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.q-tag { font-size: 11px; background: #ede9fe; color: #4c1d95; padding: 2px 8px; border-radius: 99px; }

.action-row { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; }

/* Progress */
.progress-section { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
.progress-q { font-size: 13px; font-weight: 600; color: #2563eb; margin-bottom: 0.75rem; }
.progress-lines { display: flex; flex-direction: column; gap: 4px; }
.progress-line { font-size: 13px; color: #555; display: flex; align-items: center; gap: 8px; }
.progress-line .pq { font-family: monospace; font-size: 12px; background: #f3f4f6; padding: 2px 8px; border-radius: 4px; color: #374151; }
.progress-line .pc { font-size: 12px; color: #6366f1; font-weight: 600; white-space: nowrap; }
.progress-total { font-size: 13px; color: #888; margin-top: 8px; font-style: italic; }

/* Analysis */
.analysis-q-title { font-size: 16px; font-weight: 700; margin-bottom: 1rem; color: #1a1a1a; padding-bottom: 0.75rem; border-bottom: 1px solid #f0f0f0; }
.analysis-body { font-size: 14px; line-height: 1.9; color: #1a1a1a; }
.analysis-body h2 { font-size: 14px; font-weight: 700; color: #6366f1; margin: 1.25rem 0 0.5rem; text-transform: uppercase; letter-spacing: 0.3px; font-size: 12px; }
.analysis-body p { margin-bottom: 0.75rem; }
.analysis-body ul { padding-left: 1.25rem; margin-bottom: 0.75rem; }
.analysis-body li { margin-bottom: 0.3rem; }
.analysis-body strong { font-weight: 600; }
.analysis-body a { color: #6366f1; text-decoration: none; font-size: 12px; border: 1px solid #c7d2fe; border-radius: 3px; padding: 1px 5px; margin: 0 2px; vertical-align: middle; white-space: nowrap; }
.analysis-body a:hover { background: #ede9fe; }
.analysis-meta { font-size: 12px; color: #aaa; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #f0f0f0; }

.sep { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }

/* Chat */
.chat-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e5e5e5; padding: 0.875rem 1.5rem; }
.chat-row { display: flex; gap: 8px; max-width: 820px; margin: 0 auto; }
.chat-row textarea { height: 40px; resize: none; overflow: hidden; padding: 9px 14px; border-radius: 8px; }
.chat-row button { padding: 0 18px; height: 40px; }

.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ddd; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>⚖️ Jurisxium</h1>
  <span id="statusDot" class="dot"></span>
</header>

<div class="page" id="page">

  <div id="initialView">
    <div class="initial" style="margin-bottom:1.5rem;">
      <h2>Analyse juridique</h2>
      <p>Décrivez votre situation. Jurisxium identifie les questions de droit, recherche la jurisprudence et rédige une analyse complète.</p>
    </div>
    <div class="section">
      <div class="section-label label-gray">Situation</div>
      <textarea id="factsInput" rows="6" placeholder="Décrivez les faits en détail..."></textarea>
      <div class="action-row">
        <button class="btn primary" id="btnQualify" onclick="qualify()">Identifier les questions de droit →</button>
      </div>
    </div>
  </div>

  <div id="resultsView" style="display:none;"></div>

</div>

<div class="chat-bar" id="chatBar" style="display:none;">
  <div class="chat-row">
    <textarea id="chatInput" placeholder="Posez une question sur l'analyse..." onkeydown="chatKey(event)" rows="1"></textarea>
    <button class="btn primary" onclick="sendChat()">Envoyer</button>
  </div>
</div>

<script>
let state = { facts: '', questions: [], history: [], analyzing: false };

async function checkStatus() {
  try {
    const r = await fetch('/api/healthcheck');
    const d = await r.json();
    document.getElementById('statusDot').className = 'dot' + (d.ok ? '' : ' off');
  } catch(e) { document.getElementById('statusDot').className = 'dot off'; }
}

function append(html) {
  const v = document.getElementById('resultsView');
  v.insertAdjacentHTML('beforeend', html);
  v.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderMarkdown(text) {
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h2>$1</h2>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
    .replace(/\n\n/g,'</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p><\/p>/g,'').replace(/<p>(<h2>)/g,'$1').replace(/<\/h2><\/p>/g,'</h2>').replace(/<p>(<ul>)/g,'$1').replace(/<\/ul><\/p>/g,'</ul>');
  return html;
}

async function qualify() {
  const facts = document.getElementById('factsInput').value.trim();
  if (!facts) return;
  state.facts = facts;
  const btn = document.getElementById('btnQualify');
  btn.disabled = true;
  btn.textContent = 'Analyse en cours...';

  try {
    const res = await fetch('/api/qualify', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ facts })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    state.questions = data.questions_droit || [];

    document.getElementById('initialView').style.display = 'none';
    document.getElementById('resultsView').style.display = 'block';
    document.getElementById('chatBar').style.display = 'block';

    // Résumé des faits
    append(`<div class="section">
      <div class="section-label label-gray">Résumé des faits</div>
      <div class="facts-text">${data.resume_faits}</div>
    </div>`);

    // Questions
    let qHtml = `<div class="section">
      <div class="section-label label-purple">Questions de droit identifiées (${state.questions.length})</div>
      <div class="q-list">`;
    state.questions.forEach((q, i) => {
      qHtml += `<div class="q-card">
        <div class="q-num">Question ${i+1}</div>
        <div class="q-title">${q.titre}</div>
        <div class="q-desc">${q.description}</div>
        <div class="q-tags">${(q.branches||[]).map(b=>`<span class="q-tag">${b}</span>`).join('')}</div>
      </div>`;
    });
    qHtml += `</div>
      <div class="action-row">
        <button class="btn green" onclick="startAnalysis()">Analyser ces questions →</button>
        <button class="btn" onclick="focusChat('Modifie les questions : ')">Modifier les questions</button>
      </div>
    </div>`;
    append(qHtml);

  } catch(e) {
    append(`<div class="section" style="color:#991b1b;">Erreur : ${e.message}</div>`);
    btn.disabled = false;
    btn.textContent = 'Identifier les questions de droit →';
  }
}

function focusChat(prefix) {
  const el = document.getElementById('chatInput');
  el.value = prefix;
  el.focus();
}

async function startAnalysis() {
  if (state.analyzing) return;
  state.analyzing = true;

  // Supprime les boutons de validation
  document.querySelectorAll('.action-row').forEach(el => el.remove());

  append('<hr class="sep">');

  // Crée la section de progression
  const progressId = 'progress-' + Date.now();
  append(`<div class="progress-section" id="${progressId}">
    <div class="progress-q" id="${progressId}-title"><span class="spinner"></span>Initialisation...</div>
    <div class="progress-lines" id="${progressId}-lines"></div>
    <div class="progress-total" id="${progressId}-total"></div>
  </div>`);

  const url = `/api/analyze-stream?facts=${encodeURIComponent(state.facts)}&questions=${encodeURIComponent(JSON.stringify(state.questions))}`;
  const es = new EventSource(url);

  const queryStats = {};
  let currentQ = null;
  let totalJP = 0;

  function updateProgress() {
    const linesEl = document.getElementById(progressId + '-lines');
    if (!linesEl) return;
    linesEl.innerHTML = Object.entries(queryStats).map(([q, count]) =>
      `<div class="progress-line"><span class="pq">${q}</span><span class="pc">${count} JP</span></div>`
    ).join('');
    const totalEl = document.getElementById(progressId + '-total');
    if (totalEl) totalEl.textContent = `Total : ${totalJP} décisions analysées`;
  }

  es.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'question_start') {
      currentQ = data.question;
      queryStats = {};
      totalJP = 0;
      const titleEl = document.getElementById(progressId + '-title');
      if (titleEl) titleEl.innerHTML = `<span class="spinner"></span>Question ${data.idx + 1} / ${state.questions.length} — ${data.question.titre}`;
    }

    if (data.type === 'queries') {
      data.queries.forEach(q => { queryStats[q] = 0; });
      updateProgress();
    }

    if (data.type === 'new_queries') {
      data.queries.forEach(q => { queryStats[q] = 0; });
      updateProgress();
    }

    if (data.type === 'progress') {
      queryStats[data.query] = (queryStats[data.query] || 0) + data.found;
      totalJP += data.found;
      updateProgress();
    }

    if (data.type === 'evaluating') {
      const totalEl = document.getElementById(progressId + '-total');
      if (totalEl) totalEl.textContent = `${data.total} JP analysées — évaluation de la pertinence...`;
    }

    if (data.type === 'sufficient') {
      const totalEl = document.getElementById(progressId + '-total');
      if (totalEl) totalEl.textContent = `✓ ${data.total} JP analysées — jurisprudence suffisante trouvée`;
    }

    if (data.type === 'status') {
      const totalEl = document.getElementById(progressId + '-total');
      if (totalEl) totalEl.textContent = data.msg;
    }

    if (data.type === 'question_done') {
      // Affiche l'analyse de la question
      const titleEl = document.getElementById(progressId + '-title');
      if (titleEl) titleEl.innerHTML = `✓ Question ${data.idx + 1} terminée`;

      append(`<div class="section">
        <div class="analysis-q-title">Question ${data.idx + 1} — ${currentQ?.titre || ''}</div>
        <div class="analysis-body">${renderMarkdown(data.analysis)}</div>
        <div class="analysis-meta">${data.decisions_count} décisions analysées</div>
      </div>`);

      // Remet à zéro le progress pour la question suivante
      if (data.idx < state.questions.length - 1) {
        queryStats = {};
        totalJP = 0;
        updateProgress();
      }
    }

    if (data.type === 'done') {
      const progressEl = document.getElementById(progressId);
      if (progressEl) progressEl.remove();
      append(`<div class="section" style="background:#f0fdf4; border-color:#bbf7d0;">
        <div class="section-label label-green">✓ Analyse complète</div>
        <div class="facts-text">Toutes les questions ont été analysées. Posez vos questions via le chat.</div>
      </div>`);
      state.analyzing = false;
      es.close();
    }

    if (data.type === 'error') {
      append(`<div class="section" style="color:#991b1b;">Erreur : ${data.message}</div>`);
      state.analyzing = false;
      es.close();
    }
  };

  es.onerror = () => {
    append(`<div class="section" style="color:#991b1b;">Connexion perdue. Rechargez la page.</div>`);
    state.analyzing = false;
    es.close();
  };
}

function chatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  append(`<div class="section" style="background:#ede9fe; border-color:#c4b5fd;">
    <div class="facts-text" style="color:#3730a3;">${msg.replace(/</g,'&lt;')}</div>
  </div>`);

  try {
    const context = `Faits : ${state.facts}\nQuestions : ${state.questions.map((q,i)=>(i+1)+'. '+q.titre).join(', ')}`;
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ message: msg, history: state.history, context })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    append(`<div class="section">
      <div class="analysis-body">${renderMarkdown(data.reply)}</div>
    </div>`);

    state.history.push({ role: 'user', content: msg });
    state.history.push({ role: 'assistant', content: data.reply });
  } catch(e) {
    append(`<div class="section" style="color:#991b1b;">Erreur : ${e.message}</div>`);
  }
}

checkStatus();
</script>
</body>
</html>
